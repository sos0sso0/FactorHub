<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因子管理 - FactorFlow</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/common.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Fira Sans"', 'sans-serif'],
                        mono: ['"Fira Code"', 'monospace'],
                    },
                    colors: {
                        primary: {
                            50: '#EFF6FF',
                            100: '#DBEAFE',
                            200: '#BFDBFE',
                            300: '#93C5FD',
                            400: '#60A5FA',
                            500: '#3B82F6',
                            600: '#2563EB',
                            700: '#1D4ED8',
                            800: '#1E40AF',
                            900: '#1E3A8A',
                        },
                        accent: {
                            500: '#F59E0B',
                            600: '#D97706',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50">
    <!-- 顶部导航栏 -->
    <header class="bg-gradient-to-r from-primary-700 to-primary-600 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="text-3xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold">FactorFlow</h1>
                        <p class="text-sm text-primary-100">因子管理</p>
                    </div>
                </div>
                <nav class="hidden md:flex gap-6">
                    <a href="index.html" class="text-white hover:text-primary-100 font-medium">首页</a>
                    <a href="factor-management.html" class="text-white border-b-2 border-white font-medium">因子管理</a>
                    <a href="factor-analysis.html" class="text-white hover:text-primary-100 font-medium">因子分析</a>
                    <a href="factor-mining.html" class="text-white hover:text-primary-100 font-medium">因子挖掘</a>
                    <a href="portfolio-analysis.html" class="text-white hover:text-primary-100 font-medium">组合分析</a>
                    <a href="backtesting.html" class="text-white hover:text-primary-100 font-medium">策略回测</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-6 py-8">
        <!-- 因子列表 -->
            <div id="content-list">
                <!-- 工具栏 -->
                <div class="card mb-6">
                    <div class="flex flex-wrap gap-4 items-center justify-between">
                        <!-- 左侧筛选器 -->
                        <div class="flex flex-wrap gap-4 items-center flex-1">
                            <div class="min-w-[200px]">
                                <label class="block text-sm text-slate-600 mb-2">分类筛选</label>
                                <select id="category-filter" class="select" onchange="refreshFactorList(true)">
                                    <option value="">全部</option>
                                </select>
                            </div>
                            <div class="min-w-[200px]">
                                <label class="block text-sm text-slate-600 mb-2">来源筛选</label>
                                <select id="source-filter" class="select" onchange="refreshFactorList(true)">
                                    <option value="">全部</option>
                                    <option value="preset">预置</option>
                                    <option value="user">自定义</option>
                                </select>
                            </div>
                            <div class="min-w-[200px]">
                                <label class="block text-sm text-slate-600 mb-2">搜索</label>
                                <input type="text" id="search-input" class="input" placeholder="搜索因子名称...">
                            </div>
                        </div>

                        <!-- 右侧操作按钮 -->
                        <div class="flex gap-3">
                            <button onclick="refreshFactorList(true)" class="btn btn-primary cursor-pointer transition-all duration-200">
                                刷新
                            </button>
                            <button onclick="openCreateModal()" class="btn btn-primary cursor-pointer transition-all duration-200">
                                + 新增因子
                            </button>
                            <button onclick="openBatchModal()" class="btn btn-primary cursor-pointer transition-all duration-200">
                                批量生成
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 因子列表表格 -->
                <div class="card overflow-hidden">
                    <div class="table-container">
                        <table id="factors-table" class="w-full">
                            <thead class="sticky top-0 z-10 bg-white shadow-sm">
                                <tr>
                                    <th class="w-48">因子名称</th>
                                    <th class="w-24">分类</th>
                                    <th class="w-20">来源</th>
                                    <th class="w-64">说明</th>
                                    <th class="w-32">操作</th>
                                </tr>
                            </thead>
                            <tbody id="factors-tbody">
                                <tr>
                                    <td colspan="5" class="text-center text-slate-600 py-8">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 分页控件 -->
                    <div id="pagination-container" class="hidden px-6 py-4 border-t border-slate-200 bg-slate-50">
                        <div class="flex flex-col lg:flex-row items-center justify-between gap-4">
                            <div class="text-sm text-slate-600 whitespace-nowrap">
                                显示第 <span id="pagination-start" class="font-semibold text-primary-600">0</span>
                                到 <span id="pagination-end" class="font-semibold text-primary-600">0</span> 条，共 <span id="pagination-total" class="font-semibold text-primary-600">0</span> 条
                            </div>

                            <div class="flex items-center flex-wrap justify-center gap-2">
                                <!-- 每页显示数量选择器 -->
                                <select id="page-size-select" onchange="changePageSize()" class="select text-sm py-1 px-2 w-24">
                                    <option value="10">10条/页</option>
                                    <option value="20" selected>20条/页</option>
                                    <option value="50">50条/页</option>
                                    <option value="100">100条/页</option>
                                </select>

                                <!-- 分页按钮 -->
                                <div class="flex items-center gap-1">
                                    <button onclick="goToFirstPage()" class="btn btn-secondary text-sm py-1 px-2" title="首页">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                                        </svg>
                                    </button>
                                    <button onclick="goToPrevPage()" class="btn btn-secondary text-sm py-1 px-2" title="上一页">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                                        </svg>
                                    </button>

                                    <span id="pagination-info" class="text-sm text-slate-600 whitespace-nowrap min-w-[80px] text-center">第 1 页</span>

                                    <button onclick="goToNextPage()" class="btn btn-secondary text-sm py-1 px-2" title="下一页">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                        </svg>
                                    </button>
                                    <button onclick="goToLastPage()" class="btn btn-secondary text-sm py-1 px-2" title="末页">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                                        </svg>
                                    </button>
                                </div>

                                <!-- 页码跳转 -->
                                <div class="flex items-center gap-2 whitespace-nowrap">
                                    <span class="text-sm text-slate-600">跳至</span>
                                    <input type="number" id="page-jump-input" min="1" class="input text-sm py-1 w-16 text-center" placeholder="页码">
                                    <button onclick="jumpToPage()" class="btn btn-primary text-sm py-1 px-3">Go</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- 新增因子弹窗 -->
    <div id="create-modal" class="fixed inset-0 bg-black bg-opacity-50 modal-backdrop hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto modal-content">
            <div class="flex items-center justify-between p-6 border-b border-slate-200">
                <h2 class="text-xl font-bold text-slate-800">创建新因子</h2>
                <button onclick="closeCreateModal()" class="text-slate-400 hover:text-slate-600 cursor-pointer transition-all duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form id="create-factor-form" onsubmit="createFactor(event)" class="p-6">
                <div class="mb-4">
                    <label class="block text-sm text-slate-600 mb-2">因子名称 *</label>
                    <input type="text" name="name" class="input" required placeholder="例如：RSI指标">
                </div>

                <div class="mb-4">
                    <label class="block text-sm text-slate-600 mb-2">因子代码 *</label>
                    <textarea name="code" class="input font-mono" rows="4" required placeholder="例如：RSI(close, 14)"></textarea>
                    <p class="text-xs text-slate-500 mt-1">支持 Python 表达式，可使用 close, open, high, low, volume 等字段</p>
                </div>

                <div class="mb-4">
                    <label class="block text-sm text-slate-600 mb-2">分类 *</label>
                    <select name="category" class="select" required>
                        <option value="">请选择</option>
                        <option value="技术指标">技术指标</option>
                        <option value="价格动量">价格动量</option>
                        <option value="成交量">成交量</option>
                        <option value="波动率">波动率</option>
                        <option value="自定义">自定义</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm text-slate-600 mb-2">说明</label>
                    <textarea name="description" class="input" rows="3" placeholder="简要描述因子的含义和用途"></textarea>
                </div>

                <div class="mb-6">
                    <label class="block text-sm text-slate-600 mb-2">公式类型</label>
                    <select name="formula_type" class="select">
                        <option value="expression">表达式</option>
                        <option value="function">函数</option>
                    </select>
                </div>

                <div class="flex gap-4">
                    <button type="submit" class="btn btn-primary flex-1 cursor-pointer transition-all duration-200">
                        创建因子
                    </button>
                    <button type="button" onclick="validateFormula()" class="btn btn-secondary cursor-pointer transition-all duration-200">
                        验证公式
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 批量生成弹窗 -->
    <div id="batch-modal" class="fixed inset-0 bg-black bg-opacity-50 modal-backdrop hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto modal-content">
            <div class="flex items-center justify-between p-6 border-b border-slate-200">
                <h2 class="text-xl font-bold text-slate-800">批量生成因子</h2>
                <button onclick="closeBatchModal()" class="text-slate-400 hover:text-slate-600 cursor-pointer transition-all duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form id="batch-generate-form" onsubmit="batchGenerate(event)" class="p-6">
                <div class="mb-4">
                    <label class="block text-sm text-slate-600 mb-2">选择基础因子 *</label>
                    <div class="mb-4 max-h-48 overflow-y-auto border border-slate-200 rounded-lg p-3 bg-slate-50">
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="base-factors-checkboxes">
                            <p class="text-slate-600">加载中...</p>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm text-slate-600 mb-2">生成方法 *</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer hover:bg-primary-50">
                            <input type="checkbox" name="methods" value="arithmetic" class="w-4 h-4">
                            <span>算术运算</span>
                        </label>
                        <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer hover:bg-primary-50">
                            <input type="checkbox" name="methods" value="statistics" class="w-4 h-4">
                            <span>统计变换</span>
                        </label>
                        <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer hover:bg-primary-50">
                            <input type="checkbox" name="methods" value="technical" class="w-4 h-4">
                            <span>技术指标</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-sm text-slate-600 mb-2">IC阈值</label>
                        <input type="number" name="ic_threshold" class="input" value="0.03" step="0.01" min="0" max="1">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-600 mb-2">IR阈值</label>
                        <input type="number" name="ir_threshold" class="input" value="0.5" step="0.1" min="0" max="10">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-600 mb-2">最小有效率</label>
                        <input type="number" name="min_valid_ratio" class="input" value="0.7" step="0.1" min="0" max="1">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full cursor-pointer transition-all duration-200">
                    开始批量生成
                </button>
            </form>

            <!-- 生成结果 -->
            <div id="batch-result" class="px-6 pb-6 hidden">
                <h3 class="text-lg font-semibold text-slate-800 mb-4">生成结果</h3>
                <div class="bg-slate-50 rounded-lg p-4">
                    <p class="text-slate-600" id="batch-result-content"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="js/api.js?v=2"></script>
    <script src="js/common.js"></script>
    <script>
        let allFactors = [];

        // 分页状态
        let paginationState = {
            currentPage: 1,
            pageSize: 20,
            totalItems: 0,
            totalPages: 0
        };

        // 弹窗控制函数
        function openCreateModal() {
            const modal = document.getElementById('create-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeCreateModal() {
            const modal = document.getElementById('create-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            // 重置表单
            document.getElementById('create-factor-form').reset();
        }

        function openBatchModal() {
            const modal = document.getElementById('batch-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // 加载基础因子列表
            loadBaseFactors();
        }

        function closeBatchModal() {
            const modal = document.getElementById('batch-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            // 隐藏生成结果
            document.getElementById('batch-result').classList.add('hidden');
        }

        // 点击弹窗背景关闭
        document.addEventListener('click', (e) => {
            if (e.target.id === 'create-modal') {
                closeCreateModal();
            }
            if (e.target.id === 'batch-modal') {
                closeBatchModal();
            }
        });

        // 加载因子列表
        async function loadFactors() {
            try {
                const result = await api.getFactors();

                if (result.success) {
                    allFactors = result.data;
                    // 更新分类筛选器
                    updateCategoryFilter(allFactors);
                    // 刷新因子列表（带分页）
                    refreshFactorList(true);
                }
            } catch (error) {
                console.error('加载因子列表失败:', error);
                showToast('加载因子列表失败', 'error');
            }
        }

        // 显示因子列表（支持分页）
        function displayFactors(factors, resetPage = true) {
            const tbody = document.getElementById('factors-tbody');
            const paginationContainer = document.getElementById('pagination-container');

            if (!factors || factors.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-slate-600 py-8">暂无数据</td></tr>';
                paginationContainer.classList.add('hidden');
                return;
            }

            // 更新总数
            paginationState.totalItems = factors.length;
            paginationState.totalPages = Math.ceil(paginationState.totalItems / paginationState.pageSize);

            // 如果需要重置页码（如筛选、搜索时）
            if (resetPage) {
                paginationState.currentPage = 1;
            }

            // 确保当前页码有效
            if (paginationState.currentPage > paginationState.totalPages) {
                paginationState.currentPage = paginationState.totalPages;
            }
            if (paginationState.currentPage < 1) {
                paginationState.currentPage = 1;
            }

            // 计算当前页的数据
            const startIndex = (paginationState.currentPage - 1) * paginationState.pageSize;
            const endIndex = Math.min(startIndex + paginationState.pageSize, paginationState.totalItems);
            const pageFactors = factors.slice(startIndex, endIndex);

            // 渲染表格数据
            tbody.innerHTML = pageFactors.map(factor => `
                <tr class="table-row-hover">
                    <td class="py-3 px-4">
                        <div class="font-medium text-slate-800">${factor.name}</div>
                        <div class="text-xs text-slate-500 font-mono mt-1">${factor.code}</div>
                    </td>
                    <td class="py-3 px-4">
                        <span class="badge badge-primary whitespace-nowrap">${factor.category || '-'}</span>
                    </td>
                    <td class="py-3 px-4">
                        <span class="badge ${factor.source === 'preset' ? 'badge-success' : 'badge-warning'} whitespace-nowrap">
                            ${factor.source === 'preset' ? '预置' : '自定义'}
                        </span>
                    </td>
                    <td class="py-3 px-4">
                        <div class="text-sm text-slate-600 max-w-[16rem] truncate" title="${factor.description || '-'}">
                            ${factor.description || '-'}
                        </div>
                    </td>
                    <td class="py-3 px-4">
                        <div class="flex gap-2 whitespace-nowrap">
                            <button onclick="viewFactor('${factor.name}')" class="btn btn-secondary text-sm py-1 px-3 cursor-pointer transition-all duration-200">
                                查看
                            </button>
                            ${factor.source === 'user' ? `
                                <button onclick="deleteFactor('${factor.name}')" class="btn btn-danger text-sm py-1 px-3 cursor-pointer transition-all duration-200">
                                    删除
                                </button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');

            // 显示分页控件
            updatePaginationControls(startIndex, endIndex);
        }

        // 更新分页控件
        function updatePaginationControls(startIndex, endIndex) {
            const paginationContainer = document.getElementById('pagination-container');

            // 如果只有一页或没有数据，隐藏分页
            if (paginationState.totalPages <= 1) {
                paginationContainer.classList.add('hidden');
                return;
            }

            paginationContainer.classList.remove('hidden');

            // 更新信息显示
            document.getElementById('pagination-start').textContent = startIndex + 1;
            document.getElementById('pagination-end').textContent = endIndex;
            document.getElementById('pagination-total').textContent = paginationState.totalItems;
            document.getElementById('pagination-info').textContent = `第 ${paginationState.currentPage} / ${paginationState.totalPages} 页`;

            // 更新跳转输入框的最大值
            document.getElementById('page-jump-input').max = paginationState.totalPages;
            document.getElementById('page-jump-input').value = '';

            // 更新按钮状态
            const isFirstPage = paginationState.currentPage === 1;
            const isLastPage = paginationState.currentPage === paginationState.totalPages;

            const firstPageBtn = document.querySelector('[onclick="goToFirstPage()"]');
            const prevPageBtn = document.querySelector('[onclick="goToPrevPage()"]');
            const nextPageBtn = document.querySelector('[onclick="goToNextPage()"]');
            const lastPageBtn = document.querySelector('[onclick="goToLastPage()"]');

            if (firstPageBtn) firstPageBtn.disabled = isFirstPage;
            if (prevPageBtn) prevPageBtn.disabled = isFirstPage;
            if (nextPageBtn) nextPageBtn.disabled = isLastPage;
            if (lastPageBtn) lastPageBtn.disabled = isLastPage;
        }

        // 分页导航函数
        function goToFirstPage() {
            if (paginationState.currentPage === 1) return;
            paginationState.currentPage = 1;
            refreshFactorList(false);
        }

        function goToPrevPage() {
            if (paginationState.currentPage <= 1) return;
            paginationState.currentPage--;
            refreshFactorList(false);
        }

        function goToNextPage() {
            if (paginationState.currentPage >= paginationState.totalPages) return;
            paginationState.currentPage++;
            refreshFactorList(false);
        }

        function goToLastPage() {
            if (paginationState.currentPage === paginationState.totalPages) return;
            paginationState.currentPage = paginationState.totalPages;
            refreshFactorList(false);
        }

        function changePageSize() {
            const select = document.getElementById('page-size-select');
            paginationState.pageSize = parseInt(select.value);
            paginationState.currentPage = 1; // 重置到第一页
            refreshFactorList(false);
        }

        function jumpToPage() {
            const input = document.getElementById('page-jump-input');
            const targetPage = parseInt(input.value);

            if (isNaN(targetPage) || targetPage < 1 || targetPage > paginationState.totalPages) {
                showToast(`请输入 1 到 ${paginationState.totalPages} 之间的页码`, 'warning');
                return;
            }

            paginationState.currentPage = targetPage;
            refreshFactorList(false);
            input.value = '';
        }

        // 刷新因子列表（不重置页码）
        function refreshFactorList(resetPage = false) {
            const categoryFilter = document.getElementById('category-filter').value;
            const sourceFilter = document.getElementById('source-filter').value;
            const searchInput = document.getElementById('search-input').value.toLowerCase();

            // 筛选因子
            let filteredFactors = allFactors;

            if (categoryFilter) {
                filteredFactors = filteredFactors.filter(f => f.category === categoryFilter);
            }

            if (sourceFilter) {
                filteredFactors = filteredFactors.filter(f => {
                    if (sourceFilter === 'preset') return f.source === 'preset';
                    if (sourceFilter === 'user') return f.source === 'user';
                    return true;
                });
            }

            if (searchInput) {
                filteredFactors = filteredFactors.filter(f =>
                    f.name.toLowerCase().includes(searchInput) ||
                    (f.description && f.description.toLowerCase().includes(searchInput)) ||
                    f.code.toLowerCase().includes(searchInput)
                );
            }

            displayFactors(filteredFactors, resetPage);
        }

        // 更新分类筛选器
        function updateCategoryFilter(factors) {
            const select = document.getElementById('category-filter');
            const categories = [...new Set(factors.map(f => f.category).filter(Boolean))];

            const currentValue = select.value;
            select.innerHTML = '<option value="">全部</option>' +
                categories.map(cat => `<option value="${cat}" ${cat === currentValue ? 'selected' : ''}>${cat}</option>`).join('');
        }

        // 查看因子详情
        function viewFactor(name) {
            const factor = allFactors.find(f => f.name === name);
            if (!factor) return;

            alert(`因子名称：${factor.name}\n公式：${factor.code}\n分类：${factor.category || '-'}\n说明：${factor.description || '-'}`);
        }

        // 创建因子
        async function createFactor(event) {
            event.preventDefault();
            const form = event.target;
            const data = collectFormData(form);

            try {
                showLoading('创建因子中...');
                const result = await api.createFactor(data);

                if (result.success) {
                    showToast('因子创建成功', 'success');
                    form.reset();
                    closeCreateModal();
                    // 刷新因子列表
                    loadFactors();
                } else {
                    showToast(result.message || '创建失败', 'error');
                }
            } catch (error) {
                console.error('创建因子失败:', error);
                showToast('创建因子失败', 'error');
            } finally {
                hideLoading();
            }
        }

        // 验证公式
        async function validateFormula() {
            const form = document.getElementById('create-factor-form');
            const code = form.code.value;
            const formulaType = form.formula_type.value;

            if (!code) {
                showToast('请先输入因子代码', 'warning');
                return;
            }

            try {
                showLoading('验证公式中...');
                const result = await api.validateFactor({
                    code: code,
                    formula_type: formulaType
                });

                if (result.success) {
                    showToast('公式验证通过', 'success');
                } else {
                    showToast(result.message || '公式验证失败', 'error');
                }
            } catch (error) {
                console.error('验证公式失败:', error);
                showToast('验证失败', 'error');
            } finally {
                hideLoading();
            }
        }

        // 删除因子
        async function deleteFactor(name) {
            if (!confirm(`确定要删除因子 "${name}" 吗？`)) return;

            try {
                showLoading('删除中...');
                // 这里需要获取factor_id，暂时用name
                const result = await api.deleteFactor(name);

                if (result.success) {
                    showToast('删除成功', 'success');
                    loadFactors();
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除因子失败:', error);
                showToast('删除失败', 'error');
            } finally {
                hideLoading();
            }
        }

        // 加载基础因子（用于批量生成）
        async function loadBaseFactors() {
            try {
                const result = await api.getFactors();

                if (result.success) {
                    const container = document.getElementById('base-factors-checkboxes');
                    container.innerHTML = result.data.map(factor => `
                        <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer hover:bg-primary-50" title="${factor.code}">
                            <input type="checkbox" name="base_factors" value="${factor.code}" class="w-4 h-4">
                            <span class="text-sm">${factor.name}</span>
                        </label>
                    `).join('');
                }
            } catch (error) {
                console.error('加载基础因子失败:', error);
            }
        }

        // 批量生成
        async function batchGenerate(event) {
            event.preventDefault();
            const form = event.target;

            // 获取选中的基础因子
            const baseFactors = Array.from(form.querySelectorAll('input[name="base_factors"]:checked'))
                .map(cb => cb.value);

            // 获取选中的生成方法
            const methods = Array.from(form.querySelectorAll('input[name="methods"]:checked'))
                .map(cb => cb.value);

            if (baseFactors.length === 0) {
                showToast('请至少选择一个基础因子', 'warning');
                return;
            }

            if (methods.length === 0) {
                showToast('请至少选择一种生成方法', 'warning');
                return;
            }

            const data = {
                base_factors: baseFactors,
                generate_methods: methods,
                ic_threshold: parseFloat(form.ic_threshold.value),
                ir_threshold: parseFloat(form.ir_threshold.value),
                min_valid_ratio: parseFloat(form.min_valid_ratio.value),
            };

            try {
                showLoading('批量生成中，请稍候...');
                const result = await api.batchGenerateFactors(data);

                if (result.success) {
                    const resultDiv = document.getElementById('batch-result');
                    const resultContent = document.getElementById('batch-result-content');

                    resultContent.innerHTML = `
                        <p class="mb-2">生成完成！</p>
                        <p>生成因子数：${result.data.generated_count || 0}</p>
                        <p>通过筛选：${result.data.passed_count || 0}</p>
                    `;
                    resultDiv.classList.remove('hidden');
                    showToast('批量生成完成', 'success');

                    // 刷新因子列表
                    loadFactors();

                    // 3秒后自动关闭弹窗
                    setTimeout(() => {
                        closeBatchModal();
                    }, 3000);
                }
            } catch (error) {
                console.error('批量生成失败:', error);
                showToast('批量生成失败', 'error');
            } finally {
                hideLoading();
            }
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', () => {
            loadFactors();

            // 移除tab-content的hidden类，确保因子列表始终显示
            const listContent = document.getElementById('content-list');
            if (listContent) {
                listContent.classList.remove('tab-content', 'hidden');
            }

            // 添加筛选器事件监听
            const categoryFilter = document.getElementById('category-filter');
            const sourceFilter = document.getElementById('source-filter');
            const searchInput = document.getElementById('search-input');

            if (categoryFilter) {
                categoryFilter.addEventListener('change', () => refreshFactorList(true));
            }

            if (sourceFilter) {
                sourceFilter.addEventListener('change', () => refreshFactorList(true));
            }

            if (searchInput) {
                // 使用防抖优化搜索体验
                let searchTimeout;
                searchInput.addEventListener('input', () => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        refreshFactorList(true);
                    }, 300);
                });

                // 支持回车键搜索
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        clearTimeout(searchTimeout);
                        refreshFactorList(true);
                    }
                });
            }
        });
    </script>
</body>
</html>
