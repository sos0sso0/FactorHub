<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因子挖掘 - FactorFlow</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/common.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Fira Sans"', 'sans-serif'],
                        mono: ['"Fira Code"', 'monospace'],
                    },
                    colors: {
                        primary: {
                            50: '#EFF6FF',
                            100: '#DBEAFE',
                            200: '#BFDBFE',
                            300: '#93C5FD',
                            400: '#60A5FA',
                            500: '#3B82F6',
                            600: '#2563EB',
                            700: '#1D4ED8',
                            800: '#1E40AF',
                            900: '#1E3A8A',
                        },
                        accent: {
                            500: '#F59E0B',
                            600: '#D97706',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50">
    <!-- 顶部导航栏 -->
    <header class="bg-gradient-to-r from-primary-700 to-primary-600 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="text-3xl">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold">FactorFlow</h1>
                        <p class="text-sm text-primary-100">因子挖掘</p>
                    </div>
                </div>
                <nav class="hidden md:flex gap-6">
                    <a href="index.html" class="text-white hover:text-primary-100 font-medium">首页</a>
                    <a href="factor-management.html" class="text-white hover:text-primary-100 font-medium">因子管理</a>
                    <a href="factor-analysis.html" class="text-white hover:text-primary-100 font-medium">因子分析</a>
                    <a href="factor-mining.html" class="text-white border-b-2 border-white font-medium">因子挖掘</a>
                    <a href="portfolio-analysis.html" class="text-white hover:text-primary-100 font-medium">组合分析</a>
                    <a href="backtesting.html" class="text-white hover:text-primary-100 font-medium">策略回测</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 配置面板 -->
            <div class="card">
                <h2 class="text-lg font-bold text-slate-800 mb-4">遗传算法配置</h2>

                <form id="mining-form" onsubmit="startMining(event)">
                    <!-- 基础配置 -->
                    <div class="mb-4">
                        <label class="block text-sm text-slate-600 mb-2">股票代码</label>
                        <input type="text" name="stock_code" class="input" value="000001" placeholder="例如：000001" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm text-slate-600 mb-2">开始日期</label>
                            <input type="date" name="start_date" id="start-date" class="input" required>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600 mb-2">结束日期</label>
                            <input type="date" name="end_date" id="end-date" class="input" required>
                        </div>
                    </div>

                    <hr class="my-4">

                    <!-- 基础因子选择 -->
                    <h3 class="font-semibold text-slate-800 mb-3">基础因子选择</h3>
                    <p class="text-xs text-slate-500 mb-3">选择作为遗传算法输入的基础因子</p>

                    <div class="mb-4">
                        <button type="button" onclick="loadFactors()" class="btn btn-secondary text-sm mb-2">
                            🔄 加载因子列表
                        </button>
                    </div>

                    <div class="mb-4 max-h-48 overflow-y-auto border border-slate-200 rounded-lg p-3 bg-slate-50">
                        <div id="base-factors-list" class="grid grid-cols-1 gap-2">
                            <p class="text-sm text-slate-500 text-center py-4">点击上方按钮加载因子</p>
                        </div>
                    </div>

                    <hr class="my-4">

                    <!-- 算法参数 -->
                    <h3 class="font-semibold text-slate-800 mb-3">算法参数</h3>

                    <div class="mb-4">
                        <label class="block text-sm text-slate-600 mb-2">种群大小</label>
                        <input type="number" name="population_size" class="input" value="50" min="10" max="200">
                        <p class="text-xs text-slate-500 mt-1">每一代的个体数量</p>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm text-slate-600 mb-2">迭代次数</label>
                        <input type="number" name="generations" class="input" value="10" min="1" max="100">
                        <p class="text-xs text-slate-500 mt-1">进化代数</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm text-slate-600 mb-2">变异率</label>
                            <input type="number" name="mutation_rate" class="input" value="0.2" min="0" max="1" step="0.05">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600 mb-2">交叉率</label>
                            <input type="number" name="crossover_rate" class="input" value="0.7" min="0" max="1" step="0.05">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm text-slate-600 mb-2">精英保留数量</label>
                        <input type="number" name="elite_size" class="input" value="5" min="0" max="20">
                        <p class="text-xs text-slate-500 mt-1">每代保留的最优个体数</p>
                    </div>

                    <hr class="my-4">

                    <!-- 适应度函数 -->
                    <h3 class="font-semibold text-slate-800 mb-3">适应度函数</h3>

                    <div class="mb-4">
                        <label class="block text-sm text-slate-600 mb-2">优化目标</label>
                        <select name="fitness_objective" class="select">
                            <option value="ic_mean">IC均值</option>
                            <option value="ir_ratio">IR比率</option>
                            <option value="sharpe">夏普比率</option>
                            <option value="combined">综合得分</option>
                        </select>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm text-slate-600 mb-2">IC阈值</label>
                        <input type="number" name="ic_threshold" class="input" value="0.03" step="0.01" min="0">
                    </div>

                    <button type="submit" class="btn btn-primary w-full">
                        🧬 开始挖掘
                    </button>
                </form>
            </div>

            <!-- 结果展示 -->
            <div class="lg:col-span-2">
                <div class="card">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">挖掘结果</h2>

                    <!-- 等待提示 -->
                    <div id="mining-placeholder" class="text-center py-12">
                        <div class="text-6xl mb-4">🧬</div>
                        <p class="text-slate-600">配置参数后点击"开始挖掘"按钮</p>
                        <p class="text-sm text-slate-500 mt-2">遗传算法将自动搜索最优因子表达式</p>
                    </div>

                    <!-- 挖掘进度 -->
                    <div id="mining-progress" class="hidden">
                        <div class="mb-6">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-slate-600">挖掘进度</span>
                                <span class="text-sm font-medium text-primary-600" id="progress-text">0%</span>
                            </div>
                            <div class="w-full bg-slate-200 rounded-full h-2">
                                <div id="progress-bar" class="bg-primary-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-6">
                            <div class="text-center">
                                <p class="text-sm text-slate-600">当前代数</p>
                                <p class="text-2xl font-bold text-slate-800" id="current-generation">0</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-slate-600">最优适应度</p>
                                <p class="text-2xl font-bold text-accent-green" id="best-fitness">-</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-slate-600">平均适应度</p>
                                <p class="text-2xl font-bold text-slate-800" id="avg-fitness">-</p>
                            </div>
                        </div>

                        <!-- 进化曲线 -->
                        <div class="mb-6">
                            <h3 class="font-semibold text-slate-800 mb-3">进化曲线</h3>
                            <div class="chart-container">
                                <canvas id="evolution-chart"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- 最终结果 -->
                    <div id="mining-result" class="hidden">
                        <div class="mb-6">
                            <h3 class="font-semibold text-slate-800 mb-3">发现的因子</h3>
                            <div class="space-y-3" id="factors-list">
                                <!-- 动态填充 -->
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <button onclick="saveAllFactors()" class="btn btn-primary flex-1">
                                💾 保存全部
                            </button>
                            <button onclick="exportResults()" class="btn btn-secondary">
                                📥 导出结果
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 脚本 -->
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/chart-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        let evolutionChart = null;
        let miningInterval = null;
        let miningResults = null; // 存储挖掘结果

        // 初始化日期
        function initDates() {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setFullYear(startDate.getFullYear() - 1);

            const formatDate = (d) => d.toISOString().split('T')[0];
            document.getElementById('start-date').value = formatDate(startDate);
            document.getElementById('end-date').value = formatDate(endDate);
        }

        // 加载因子列表
        async function loadFactors() {
            try {
                const result = await api.getFactors();

                if (result.success) {
                    const factors = result.data;
                    const container = document.getElementById('base-factors-list');

                    if (factors.length === 0) {
                        container.innerHTML = '<p class="text-sm text-slate-500 text-center py-4">暂无可用因子</p>';
                        return;
                    }

                    // 按类别分组
                    const categories = {};
                    factors.forEach(factor => {
                        const category = factor.category || '未分类';
                        if (!categories[category]) {
                            categories[category] = [];
                        }
                        categories[category].push(factor);
                    });

                    // 生成复选框列表
                    container.innerHTML = Object.entries(categories).map(([category, factors]) => `
                        <div class="mb-3">
                            <p class="text-xs font-semibold text-slate-700 mb-2">${category}</p>
                            ${factors.map(factor => `
                                <label class="flex items-center gap-2 text-sm text-slate-600 mb-1 cursor-pointer hover:text-primary-600" title="${factor.code}">
                                    <input type="checkbox" name="base_factors" value="${factor.code}" class="rounded">
                                    <span>${factor.name}</span>
                                </label>
                            `).join('')}
                        </div>
                    `).join('');

                    showToast('因子加载成功', 'success');
                }
            } catch (error) {
                console.error('加载因子失败:', error);
                showToast('加载因子失败', 'error');
            }
        }

        // 开始挖掘
        async function startMining(event) {
            event.preventDefault();
            const form = event.target;
            const formData = collectFormData(form);

            // 获取选中的基础因子
            const selectedFactors = Array.from(form.querySelectorAll('input[name="base_factors"]:checked'))
                .map(cb => cb.value);

            if (selectedFactors.length === 0) {
                showToast('请至少选择一个基础因子', 'warning');
                return;
            }

            const requestData = {
                stock_code: formData.stock_code,
                base_factors: selectedFactors,  // 添加选中的基础因子
                start_date: formData.start_date,
                end_date: formData.end_date,
                population_size: parseInt(formData.population_size),
                n_generations: parseInt(formData.generations),
                cx_prob: parseFloat(formData.crossover_rate),
                mut_prob: parseFloat(formData.mutation_rate),
                elite_size: parseInt(formData.elite_size),
                fitness_objective: formData.fitness_objective,
                ic_threshold: parseFloat(formData.ic_threshold)
            };

            try {
                document.getElementById('mining-placeholder').classList.add('hidden');
                document.getElementById('mining-progress').classList.remove('hidden');
                document.getElementById('mining-result').classList.add('hidden');

                const result = await api.startGeneticMining(requestData);

                if (result.success) {
                    const taskId = result.data.task_id;

                    // 轮询获取进度
                    miningInterval = setInterval(() => checkMiningProgress(taskId), 2000);
                }
            } catch (error) {
                console.error('启动挖掘失败:', error);
                showToast('启动挖掘失败', 'error');
                document.getElementById('mining-placeholder').classList.remove('hidden');
                document.getElementById('mining-progress').classList.add('hidden');
            }
        }

        // 检查挖掘进度
        async function checkMiningProgress(taskId) {
            try {
                const result = await api.getMiningStatus(taskId);

                if (result.success) {
                    const data = result.data;

                    // 更新进度
                    const progress = (data.current_generation / data.total_generations * 100).toFixed(0);
                    document.getElementById('progress-text').textContent = progress + '%';
                    document.getElementById('progress-bar').style.width = progress + '%';
                    document.getElementById('current-generation').textContent = data.current_generation;
                    document.getElementById('best-fitness').textContent = data.best_fitness?.toFixed(4) || '-';
                    document.getElementById('avg-fitness').textContent = data.avg_fitness?.toFixed(4) || '-';

                    // 更新进化曲线
                    if (data.fitness_history) {
                        updateEvolutionChart(data.fitness_history);
                    }

                    // 检查是否完成
                    if (data.status === 'completed') {
                        clearInterval(miningInterval);
                        await getMiningResults(taskId);
                    } else if (data.status === 'failed') {
                        clearInterval(miningInterval);
                        const errorMsg = data.error || '未知错误';
                        showToast(`挖掘失败: ${errorMsg}`, 'error');
                        document.getElementById('mining-placeholder').classList.remove('hidden');
                        document.getElementById('mining-progress').classList.add('hidden');
                    }
                }
            } catch (error) {
                console.error('获取进度失败:', error);
            }
        }

        // 获取挖掘结果
        async function getMiningResults(taskId) {
            try {
                const result = await api.getMiningResults(taskId);

                if (result.success) {
                    document.getElementById('mining-progress').classList.add('hidden');
                    document.getElementById('mining-result').classList.remove('hidden');

                    const factors = result.data.factors || [];
                    miningResults = result.data; // 保存完整结果
                    displayMiningResults(factors);
                }
            } catch (error) {
                console.error('获取结果失败:', error);
            }
        }

        // 显示挖掘结果
        function displayMiningResults(factors) {
            const container = document.getElementById('factors-list');

            if (factors.length === 0) {
                container.innerHTML = '<p class="text-slate-600">未发现符合条件的因子</p>';
                return;
            }

            container.innerHTML = factors.map((factor, index) => `
                <div class="border rounded-lg p-4 hover:shadow-md transition-shadow">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="badge badge-primary">Top ${index + 1}</span>
                                <h4 class="font-semibold text-slate-800">${factor.name || `Factor_${index + 1}`}</h4>
                            </div>
                            <div class="text-sm font-mono bg-slate-50 p-2 rounded mb-2">
                                ${factor.expression}
                            </div>
                        </div>
                        <div class="text-right ml-4">
                            <p class="text-sm text-slate-600">IC: <span class="font-medium ${getValueColor(factor.ic)}">${factor.ic?.toFixed(4)}</span></p>
                            <p class="text-sm text-slate-600">IR: <span class="font-medium ${getValueColor(factor.ir)}">${factor.ir?.toFixed(4)}</span></p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="saveFactor(${index})" class="btn btn-secondary text-sm py-1 px-3">
                            💾 保存
                        </button>
                        <button onclick="analyzeFactor(${index})" class="btn btn-secondary text-sm py-1 px-3">
                            📊 分析
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 更新进化曲线
        function updateEvolutionChart(fitnessHistory) {
            const ctx = document.getElementById('evolution-chart').getContext('2d');

            if (evolutionChart) {
                evolutionChart.destroy();
            }

            evolutionChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: fitnessHistory.best.map((_, i) => i + 1),
                    datasets: [
                        {
                            label: '最优适应度',
                            data: fitnessHistory.best,
                            borderColor: ChartColors.primary,
                            backgroundColor: ChartColors.primaryBg,
                            fill: false,
                            tension: 0.4
                        },
                        {
                            label: '平均适应度',
                            data: fitnessHistory.average,
                            borderColor: ChartColors.blue,
                            backgroundColor: ChartColors.blueBg,
                            fill: false,
                            tension: 0.4
                        }
                    ]
                },
                options: getLineChartOptions({
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                })
            });
        }

        // 保存单个因子
        async function saveFactor(index) {
            if (!miningResults || !miningResults.factors) {
                showToast('没有可保存的因子', 'warning');
                return;
            }

            const factor = miningResults.factors[index];
            if (!factor) {
                showToast('因子不存在', 'error');
                return;
            }

            try {
                // 构造因子数据
                const factorData = {
                    name: factor.name || `Mined_Factor_${index + 1}`,
                    code: factor.expression,
                    category: 'user_mined',
                    description: `通过遗传算法挖掘的因子\nIC: ${factor.ic?.toFixed(4)}\nIR: ${factor.ir?.toFixed(4)}\n适应度: ${factor.fitness?.toFixed(4)}`,
                    formula_type: 'expression'
                };

                const result = await api.createFactor(factorData);

                if (result.success) {
                    showToast(`因子 "${factorData.name}" 保存成功`, 'success');
                }
            } catch (error) {
                console.error('保存因子失败:', error);
                showToast('保存因子失败: ' + error.message, 'error');
            }
        }

        // 保存全部因子
        async function saveAllFactors() {
            if (!miningResults || !miningResults.factors || miningResults.factors.length === 0) {
                showToast('没有可保存的因子', 'warning');
                return;
            }

            let successCount = 0;
            let failCount = 0;

            for (let i = 0; i < miningResults.factors.length; i++) {
                const factor = miningResults.factors[i];

                try {
                    const factorData = {
                        name: factor.name || `Mined_Factor_${i + 1}`,
                        code: factor.expression,
                        category: 'user_mined',
                        description: `通过遗传算法挖掘的因子\nIC: ${factor.ic?.toFixed(4)}\nIR: ${factor.ir?.toFixed(4)}\n适应度: ${factor.fitness?.toFixed(4)}`,
                        formula_type: 'expression'
                    };

                    await api.createFactor(factorData);
                    successCount++;
                } catch (error) {
                    console.error(`保存因子 ${i + 1} 失败:`, error);
                    failCount++;
                }
            }

            showToast(`保存完成: 成功 ${successCount} 个, 失败 ${failCount} 个`,
                successCount > 0 ? 'success' : 'error');
        }

        // 分析因子
        function analyzeFactor(index) {
            if (!miningResults || !miningResults.factors) {
                showToast('没有可分析的因子', 'warning');
                return;
            }

            const factor = miningResults.factors[index];
            if (!factor) {
                showToast('因子不存在', 'error');
                return;
            }

            // 将因子信息保存到 sessionStorage
            const tempFactor = {
                name: factor.name || `Mined_Factor_${index + 1}`,
                expression: factor.expression,
                ic: factor.ic,
                ir: factor.ir,
                fitness: factor.fitness
            };

            sessionStorage.setItem('tempFactor', JSON.stringify(tempFactor));

            // 跳转到分析页面
            window.location.href = `factor-analysis.html`;
        }

        // 导出结果
        function exportResults() {
            showToast('导出功能开发中', 'info');
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', () => {
            initDates();
        });
    </script>
</body>
</html>
