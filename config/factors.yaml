# 系统预置因子配置文件

# 价格与收益率结构因子
price_return_factors:
  - name: log_return_1
    formula: "np.log(df['close'] / df['close'].shift(1))"
    description: "日对数收益率"
    source: "system"

  - name: log_return_5
    formula: "np.log(df['close'] / df['close'].shift(5))"
    description: "5日累计收益率"
    source: "system"

  - name: price_vs_sma20
    formula: "df['close'] / df['close'].rolling(window=20).mean()"
    description: "相对20日均线位置"
    source: "system"

  - name: price_vs_sma60
    formula: "df['close'] / df['close'].rolling(window=60).mean()"
    description: "相对60日均线位置"
    source: "system"

  - name: sma20_vs_sma60
    formula: "df['close'].rolling(window=20).mean() / df['close'].rolling(window=60).mean()"
    description: "短期vs长期趋势方向"
    source: "system"

  - name: high_low_ratio
    formula: "(df['high'] - df['low']) / df['open']"
    description: "日内波动幅度（相对开盘价）"
    source: "system"

  - name: close_open_ratio
    formula: "df['close'] / df['open']"
    description: "收盘相对开盘强度"
    source: "system"

# 动量与趋势指标因子
momentum_factors:
  - name: rsi_14
    formula: "talib.RSI(df['close'], timeperiod=14)"
    description: "RSI(14) 超买超卖指标，值域[0,100]"
    source: "system"

  - name: macd_line
    formula: "talib.EMA(df['close'], timeperiod=12) - talib.EMA(df['close'], timeperiod=26)"
    description: "MACD差值线"
    source: "system"

  - name: macd_signal
    formula: "talib.EMA(talib.EMA(df['close'], 12) - talib.EMA(df['close'], 26), 9)"
    description: "MACD信号线"
    source: "system"

  - name: macd_hist
    formula: "(talib.EMA(df['close'], 12) - talib.EMA(df['close'], 26)) - talib.EMA(talib.EMA(df['close'], 12) - talib.EMA(df['close'], 26), 9)"
    description: "MACD柱状图（动量加速）"
    source: "system"

  - name: adx_14
    formula: "talib.ADX(df['high'], df['low'], df['close'], timeperiod=14)"
    description: "ADX(14) 趋势强度指标"
    source: "system"

  - name: cci_20
    formula: "talib.CCI(df['high'], df['low'], df['close'], timeperiod=20)"
    description: "CCI(20) 通道突破信号"
    source: "system"

  - name: roc_10
    formula: "(df['close'] - df['close'].shift(10)) / df['close'].shift(10)"
    description: "10日变化率"
    source: "system"

# 波动率与风险因子
volatility_factors:
  - name: atr_14
    formula: "talib.ATR(df['high'], df['low'], df['close'], timeperiod=14)"
    description: "ATR(14) 平均真实波幅"
    source: "system"

  - name: atr_norm
    formula: "talib.ATR(df['high'], df['low'], df['close'], 14) / df['close']"
    description: "波动率相对价格水平"
    source: "system"

  - name: volatility_10
    formula: "np.log(df['close'] / df['close'].shift(1)).rolling(window=10).std()"
    description: "近10日收益率标准差"
    source: "system"

  - name: bollinger_bandwidth
    formula: "(talib.BBANDS(df['close'], 20, 2, 2)[0] - talib.BBANDS(df['close'], 20, 2, 2)[2]) / talib.BBANDS(df['close'], 20, 2, 2)[1]"
    description: "布林带宽度（衡量波动压缩/扩张）"
    source: "system"

  - name: bollinger_position
    formula: "(df['close'] - talib.BBANDS(df['close'], 20, 2, 2)[2]) / (talib.BBANDS(df['close'], 20, 2, 2)[0] - talib.BBANDS(df['close'], 20, 2, 2)[2])"
    description: "价格在布林带中的相对位置[0,1]"
    source: "system"

# 成交量与资金流因子
volume_factors:
  - name: volume_ma_ratio
    formula: "df['volume'] / df['volume'].rolling(window=10).mean()"
    description: "当日量能vs近期均量"
    source: "system"

  - name: obv
    formula: "talib.OBV(df['close'], df['volume'])"
    description: "OBV累计量能趋势"
    source: "system"

  - name: obv_slope
    formula: "talib.OBV(df['close'], df['volume']) - talib.OBV(df['close'], df['volume']).shift(5)"
    description: "OBV近5日斜率（资金流入流出）"
    source: "system"

# 结构与模式识别因子
pattern_factors:
  - name: is_bullish_candle
    formula: "(df['close'] > df['open']).astype(int)"
    description: "是否阳线"
    source: "system"

  - name: regime_volatility
    formula: "(np.log(df['close'] / df['close'].shift(1)).rolling(10).std() > np.log(df['close'] / df['close'].shift(1)).rolling(10).std().quantile(0.7)).astype(int)"
    description: "高波动regime标记"
    source: "system"

  - name: regime_trend
    formula: "((talib.ADX(df['high'], df['low'], df['close'], 14) > 25) & (df['close'].rolling(20).mean() > df['close'].rolling(60).mean())).astype(int)"
    description: "趋势市标记"
    source: "system"
